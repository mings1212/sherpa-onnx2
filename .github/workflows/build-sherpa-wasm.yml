name: Build sherpa-onnx WASM with hotwords support

on:
  workflow_dispatch:

jobs:
  build-wasm:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install emsdk
        uses: mymindstorm/setup-emsdk@v14
        with:
          version: 4.0.23
          actions-cache-folder: 'emsdk-cache'

      - name: View emsdk version
        run: |
          emcc -v
          echo "--------------------"
          emcc --check

      - name: Download model files
        run: |
          cd wasm/asr/assets
          wget -q https://github.com/k2-fsa/sherpa-onnx/releases/download/asr-models/sherpa-onnx-streaming-zipformer-bilingual-zh-en-2023-02-20.tar.bz2
          tar xvf sherpa-onnx-streaming-zipformer-bilingual-zh-en-2023-02-20.tar.bz2
          rm sherpa-onnx-streaming-zipformer-bilingual-zh-en-2023-02-20.tar.bz2
          mv sherpa-onnx-streaming-zipformer-bilingual-zh-en-2023-02-20/encoder-epoch-99-avg-1.int8.onnx encoder.onnx
          mv sherpa-onnx-streaming-zipformer-bilingual-zh-en-2023-02-20/decoder-epoch-99-avg-1.onnx decoder.onnx
          mv sherpa-onnx-streaming-zipformer-bilingual-zh-en-2023-02-20/joiner-epoch-99-avg-1.int8.onnx joiner.onnx
          mv sherpa-onnx-streaming-zipformer-bilingual-zh-en-2023-02-20/tokens.txt ./
          rm -rf sherpa-onnx-streaming-zipformer-bilingual-zh-en-2023-02-20/
          ls -lh

      - name: Build sherpa-onnx for WebAssembly (ASR) with hotwords
        run: |
          export SHERPA_ONNX_ENABLE_MODIFIED_BEAM_SEARCH=ON
          export SHERPA_ONNX_ENABLE_HOTWORDS=ON
          export SHERPA_ONNX_WASM_EXPORT_FS=ON
          export SHERPA_ONNX_IS_USING_BUILD_WASM_SH=ON
          export EMSCRIPTEN=$(dirname $(realpath $(which emcc)))

          mkdir -p build-wasm-simd-asr
          cd build-wasm-simd-asr

          cmake \
            -DCMAKE_INSTALL_PREFIX=./install \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_TOOLCHAIN_FILE=$EMSCRIPTEN/cmake/Modules/Platform/Emscripten.cmake \
            -DSHERPA_ONNX_ENABLE_PYTHON=OFF \
            -DSHERPA_ONNX_ENABLE_TESTS=OFF \
            -DSHERPA_ONNX_ENABLE_CHECK=OFF \
            -DBUILD_SHARED_LIBS=OFF \
            -DSHERPA_ONNX_ENABLE_PORTAUDIO=OFF \
            -DSHERPA_ONNX_ENABLE_JNI=OFF \
            -DSHERPA_ONNX_ENABLE_C_API=ON \
            -DSHERPA_ONNX_ENABLE_TTS=OFF \
            -DSHERPA_ONNX_ENABLE_WEBSOCKET=OFF \
            -DSHERPA_ONNX_ENABLE_GPU=OFF \
            -DSHERPA_ONNX_ENABLE_WASM=ON \
            -DSHERPA_ONNX_ENABLE_WASM_ASR=ON \
            -DSHERPA_ONNX_ENABLE_BINARY=OFF \
            -DSHERPA_ONNX_LINK_LIBSTDCPP_STATICALLY=OFF \
            -DSHERPA_ONNX_ENABLE_MODIFIED_BEAM_SEARCH=ON \
            -DSHERPA_ONNX_ENABLE_HOTWORDS=ON \
            -DSHERPA_ONNX_WASM_EXPORT_FS=ON \
            ..

          make -j2
          make install

      - name: Upload WASM artifacts
        uses: actions/upload-artifact@v4
        with:
          name: sherpa-onnx-wasm-hotwords
          path: |
            build-wasm-simd-asr/install/bin/wasm/asr/**/*.wasm
            build-wasm-simd-asr/install/bin/wasm/asr/**/*.js
          compression-level: 0
